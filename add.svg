            <div class="exe-text-activity">
                <div><style>
  :root {
    --primary-green: #59a638;
    --primary-green-hover: #46822b;
    --text-dark: #333333;
    --bg-light: #f7faf5;
    --border-color: #e2ebd9;
    --radius: 12px;
  }

  .nodo6-container {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: var(--text-dark);
    max-width: 1000px;
    margin: 0 auto;
    padding: 15px;
    box-sizing: border-box;
  }

  /* Cabecera del Nodo */
  .nodo6-header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
  }

  .nodo6-number {
    background-color: var(--primary-green);
    color: white;
    font-weight: bold;
    font-size: 24px;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .nodo6-title {
    color: var(--primary-green);
    font-size: 24px;
    font-weight: 800;
    text-transform: uppercase;
    margin: 0;
    letter-spacing: 0.5px;
  }

  /* Distribución Principal (Ilustración + Bloques de Texto) */
  .nodo6-main-layout {
    display: flex;
    gap: 25px;
    margin-bottom: 30px;
    align-items: stretch;
  }

  /* Ilustración Izquierda con Emoji */
  .nodo6-illustration {
    background-color: #eef5ea;
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-width: 180px;
    font-size: 70px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
  }
  .nodo6-illustration .sub-icon {
    font-size: 30px;
    margin-top: -15px;
  }

  /* Contenedor de Bloques Derechos */
  .nodo6-blocks {
    display: flex;
    flex-direction: column;
    gap: 15px;
    flex-grow: 1;
  }

  .nodo6-card {
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    padding: 20px;
    background-color: #ffffff;
  }

  .card-title {
    color: var(--primary-green);
    font-weight: 700;
    font-size: 16px;
    text-transform: uppercase;
    margin-top: 0;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  .card-text {
    font-size: 14.5px;
    line-height: 1.6;
    margin: 0;
    color: #444;
  }

  /* Listado de Normas */
  .normas-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .normas-list li {
    font-size: 14.5px;
    line-height: 1.6;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    color: #444;
  }

  .normas-list li:last-child {
    margin-bottom: 0;
  }

  .normas-list li::before {
    content: "✓";
    color: var(--primary-green);
    font-weight: bold;
    font-size: 16px;
  }

  /* Sección Inferior: Recursos Recomendados */
  .recursos-section {
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    padding: 20px;
    background-color: #ffffff;
  }

  .recursos-title {
    color: var(--primary-green);
    font-weight: 700;
    font-size: 15px;
    text-transform: uppercase;
    margin-top: 0;
    margin-bottom: 15px;
  }

  .recursos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 15px;
  }

  .recurso-link {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 15px;
    background-color: var(--bg-light);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    text-decoration: none !important;
    transition: all 0.2s ease;
    text-align: center;
  }

  .recurso-link:hover {
    background-color: #ffffff;
    border-color: var(--primary-green);
    box-shadow: 0 4px 8px rgba(89, 166, 56, 0.1);
    transform: translateY(-2px);
  }

  .recurso-main-name {
    font-weight: 800;
    font-size: 18px;
    color: #333;
    margin-bottom: 4px;
  }

  .recurso-desc {
    font-size: 12px;
    color: #666;
    line-height: 1.3;
  }

  /* Ajustes para Pantallas Pequeñas */
  @media (max-width: 768px) {
    .nodo6-main-layout {
      flex-direction: column;
    }
    .nodo6-illustration {
      padding: 15px;
      font-size: 50px;
    }
    .nodo6-title {
      font-size: 18px;
    }
  }
</style>
<div class="nodo6-container">
<div class="nodo6-header">
<div class="nodo6-number"><br></div>
<h2 class="nodo6-title">Protección de Datos y Ciudadanía Digital</h2>
</div>
<div class="nodo6-main-layout">
<div class="nodo6-illustration"><span>🛡️</span> <span class="sub-icon">💻</span></div>
<div class="nodo6-blocks">
<div class="nodo6-card">
<h3 class="card-title">Uso responsable de las tecnologías</h3>
<p class="card-text">Utilizamos herramientas digitales de forma segura, respetuosa y responsable. Protegemos nuestros datos personales y respetamos los derechos de autor.</p>
</div>
<div class="nodo6-card">
<h3 class="card-title">Normas digitales</h3>
<ul class="normas-list">
<li>No compartimos datos personales propios ni de otras personas.</li>
<li>Usamos un lenguaje adecuado y respetuoso.</li>
<li>Citamos las fuentes y usamos recursos con licencia libre.</li>
<li>Respetamos las ideas y trabajos de los demás.</li>
</ul>
</div>
</div>
</div>
<div class="recursos-section">
<h3 class="recursos-title">Recursos Recomendados</h3>
